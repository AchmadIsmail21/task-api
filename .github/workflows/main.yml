name: .NET CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore TaskApi-belajar/TaskApi-belajar.csproj

      - name: Build
        run: dotnet build TaskApi-belajar/TaskApi-belajar.csproj --no-restore

      - name: Test
        run: dotnet test TaskApi-belajar/TaskApi-belajar.csproj --no-build

      - name: Build Docker Image
        run: docker build -t taskapi:latest .